// ─── CONSTANTS ───────────────────────────────────────────────────────────────

const LOS_BUCKETS = {
  'Oil': 'oil', 'Gas': 'gas', 'NGL': 'ngl',
  'Chemicals': 'variable_oil', 'Fuel & Power': 'variable_oil',
  'Liquids Hauling & Disposal': 'variable_water',
  'Company Labor': 'fixed', 'Contract Labor/Pumper': 'fixed',
  'Field Office': 'fixed', 'EHS & Regulatory': 'fixed',
  'Measurement/Automation': 'fixed', 'Surface Repairs & Maint': 'fixed',
  'Vehicles': 'fixed', 'Well Servicing': 'fixed',
  'Production Taxes-Oil': 'prod_taxes', 'Production Taxes-Gas': 'prod_taxes',
  'Production Taxes-NGL': 'prod_taxes', 'CAPEX': 'capex',
}

const COST_CAT_BUCKETS = {
  'Fixed': 'fixed', 'Var': 'variable_oil', 'VW': 'variable_water',
  'RevO': 'oil', 'RevG': 'gas', 'RevNGL': 'ngl',
  'PTo': 'prod_taxes', 'PTg': 'prod_taxes', 'PTn': 'prod_taxes',
}

const C = {
  oil: '#4e9af1', gas: '#f59e0b', ngl: '#10b981',
  fixed: '#6366f1', varOil: '#f97316', varWater: '#06b6d4',

  myCase: '#facc15', vdrCase: '#94a3b8', cost: '#e879f9',

// ─── CSV PARSING ─────────────────────────────────────────────────────────────

const COL = {
  WELL_NAME: 0, COST_CATEGORY: 1, NRI: 3, WI: 4,
  GROSS_AMOUNT: 5, GROSS_VOLUME: 6, JP_RP: 8,
  SERVICE_END_DATE: 11, PROPERTY_NUM: 12, PROPERTY_NAME: 13,
  OP_OBO: 15, LOS_CATEGORY: 16, NET_VOLUME: 20, NET_AMOUNT: 21,
}

const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']

function parseDate(raw) {
  if (!raw) return null
  const p = raw.toString().trim().split('/')
  if (p.length !== 3) return null
  const m = parseInt(p[0], 10) - 1
  const d = parseInt(p[1], 10)
  const y = 2000 + parseInt(p[2], 10)
  if (isNaN(m) || isNaN(d) || isNaN(y)) return null
  return new Date(y, m, d)
}

function monthKey(date) {
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}`
}

function monthDisp(date) {
  return `${MONTHS[date.getMonth()]} '${String(date.getFullYear()).slice(2)}`
}

function parseNum(raw) {
  if (raw == null || raw === '') return 0
  const n = parseFloat(raw.toString().replace(/,/g,'').trim())
  return isNaN(n) ? 0 : n
}

function resolveBucket(los, cat) {
  if (los && LOS_BUCKETS[los] !== undefined) return LOS_BUCKETS[los]
  return COST_CAT_BUCKETS[cat] || null
}

function parseCSVText(text) {
  // Strip BOM (Excel adds \uFEFF to exported files) and normalize line endings
  text = text.replace(/^\uFEFF/, '').replace(/\r\n/g, '\n')
  const result = Papa.parse(text, { delimiter: '\t', header: false, skipEmptyLines: true })
  if (!result.data || !result.data.length) throw new Error('CSV appears empty or could not be parsed.')

  const rows = result.data
  let start = 0
  const fc = (rows[0][COL.WELL_NAME] || '').toString().toLowerCase().trim()
  if (fc === 'well name' || fc === 'well' || fc === 'wellname') start = 1

  const sample = rows[start]
  if (!sample || sample.length < 17) {
    throw new Error(`Expected 17+ tab-delimited columns; found ${sample ? sample.length : 0}. Check delimiter (must be tab, not comma).`)
  }

  const parsed = []
  let skipped = 0
  for (let i = start; i < rows.length; i++) {
    const r = rows[i]
    if (!r || r.length < 17) { skipped++; continue }
    const wellName = (r[COL.WELL_NAME] || '').toString().trim()
    if (!wellName) { skipped++; continue }
    const date = parseDate(r[COL.SERVICE_END_DATE])
    if (!date) { skipped++; continue }
    const los = (r[COL.LOS_CATEGORY] || '').toString().trim()
    const cat = (r[COL.COST_CATEGORY] || '').toString().trim()
    parsed.push({
      wellName, cat,
      nri: parseNum(r[COL.NRI]), wi: parseNum(r[COL.WI]),
      grossAmount: parseNum(r[COL.GROSS_AMOUNT]),
      grossVolume: parseNum(r[COL.GROSS_VOLUME]),
      jpRp: (r[COL.JP_RP] || '').toString().trim(),
      date, monthKey: monthKey(date), monthDisp: monthDisp(date),
      propertyNum: (r[COL.PROPERTY_NUM] || '').toString().trim(),
      opObo: (r[COL.OP_OBO] || '').toString().trim(),
      los, bucket: resolveBucket(los, cat),
      netVolume: parseNum(r[COL.NET_VOLUME]),
      netAmount: parseNum(r[COL.NET_AMOUNT]),
    })
  }

  if (!parsed.length) throw new Error(`No valid rows found (${skipped} skipped). Check Service End Date format (M/DD/YY) and Well Name column.`)
  return parsed
}

// ─── AGGREGATIONS ────────────────────────────────────────────────────────────

const GAS_BOE = 6

function sd(a, b) {
  if (!b || !isFinite(b)) return 0
  const r = a / b
  return isFinite(r) ? r : 0
}

function daysInMonth(date) {
  return new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate()
}

function emptyM(date, mk, md) {
  return {
    date, monthKey: mk, monthDisp: md,
    oil_vol: 0, gas_vol: 0, ngl_vol: 0,
    oil_rev: 0, gas_rev: 0, ngl_rev: 0,
    gross_oil: 0, gross_gas: 0, gross_ngl: 0,
    fixed: 0, var_oil: 0, var_water: 0, prod_taxes: 0,
  }
}

function accum(m, row) {
  const { bucket: b, netAmount: na, netVolume: nv, grossVolume: gv } = row
  if (b === 'oil')           { m.oil_vol += nv; m.oil_rev += Math.abs(na); m.gross_oil += gv }
  else if (b === 'gas')      { m.gas_vol += nv; m.gas_rev += Math.abs(na); m.gross_gas += gv }
  else if (b === 'ngl')      { m.ngl_vol += nv; m.ngl_rev += Math.abs(na); m.gross_ngl += gv }
  else if (b === 'fixed')          { m.fixed     += na }
  else if (b === 'variable_oil')   { m.var_oil   += na }
  else if (b === 'variable_water') { m.var_water += na }
  else if (b === 'prod_taxes')     { m.prod_taxes += Math.abs(na) }
}

function metrics(m, wc) {
  const days = daysInMonth(m.date)
  const netBOE   = m.oil_vol + m.ngl_vol + sd(m.gas_vol, GAS_BOE)
  const grossBOE = m.gross_oil + m.gross_ngl + sd(m.gross_gas, GAS_BOE)
  const rev  = m.oil_rev + m.gas_rev + m.ngl_rev
  const los  = m.fixed + m.var_oil + m.var_water + m.prod_taxes
  const margin = rev - los
  return {
    ...m, wellCount: wc, netBOE, grossBOE,
    netOild:   sd(m.oil_vol, days),  netGasd:   sd(m.gas_vol, days),
    netNGLd:   sd(m.ngl_vol, days),  netBOEd:   sd(netBOE, days),
    grossOild: sd(m.gross_oil, days), grossGasd: sd(m.gross_gas, days),
    grossNGLd: sd(m.gross_ngl, days), grossBOEd: sd(grossBOE, days),
    totalRevenue: rev, totalLOS: los, opMargin: margin,
    varOilPerBOE:    sd(m.var_oil, m.oil_vol + m.ngl_vol),
    varWaterPerMonth: m.var_water,
    fixedPerWell:    sd(m.fixed, wc),
    prodTaxPct:      rev > 0 ? sd(m.prod_taxes, rev) * 100 : 0,
    costPerBOE:      sd(los, netBOE),
    revenuePerBOE:   sd(rev, netBOE),
    marginPerBOE:    sd(margin, netBOE),
    realizedOil:     sd(m.oil_rev, m.oil_vol),
    realizedGas:     sd(m.gas_rev, m.gas_vol),
    realizedNGL:     sd(m.ngl_rev, m.ngl_vol),
  }
}

function buildMonthlyRollup(rows) {
  const mm = {}, mw = {}
  for (const r of rows) {
    if (!r.bucket || r.bucket === 'capex') continue
    const k = r.monthKey
    if (!mm[k]) { mm[k] = emptyM(r.date, r.monthKey, r.monthDisp); mw[k] = new Set() }
    mw[k].add(r.wellName)
    accum(mm[k], r)
  }
  return Object.values(mm)
    .sort((a, b) => a.monthKey.localeCompare(b.monthKey))
    .map(m => metrics(m, mw[m.monthKey].size))
}

function buildWellData(rows) {
  const wm = {}
  for (const r of rows) {
    if (!r.wellName) continue
    const wn = r.wellName
    if (!wm[wn]) wm[wn] = { wellName: wn, jpRp: r.jpRp, opObo: r.opObo, nri: r.nri, wi: r.wi, months: {} }
    const w = wm[wn]
    if (r.jpRp)  w.jpRp  = r.jpRp
    if (r.opObo) w.opObo = r.opObo
    if (r.nri)   w.nri   = r.nri
    if (r.wi)    w.wi    = r.wi
    if (!r.bucket || r.bucket === 'capex') continue
    const k = r.monthKey
    if (!w.months[k]) w.months[k] = emptyM(r.date, r.monthKey, r.monthDisp)
    accum(w.months[k], r)
  }
  return Object.values(wm)
    .sort((a, b) => a.wellName.localeCompare(b.wellName))
    .map(w => ({
      ...w,
      monthlyData: Object.values(w.months)
        .sort((a, b) => a.monthKey.localeCompare(b.monthKey))
        .map(m => metrics(m, 1))
    }))
}

// ─── EXPORTS ─────────────────────────────────────────────────────────────────

function dlCSV(filename, rows) {
  if (!rows || !rows.length) return
  const hdr = Object.keys(rows[0])
  const esc = v => { const s = v == null ? '' : String(v); return (s.includes(',') || s.includes('"')) ? `"${s.replace(/"/g,'""')}"` : s }
  const csv = [hdr.map(esc).join(','), ...rows.map(r => hdr.map(h => esc(r[h])).join(','))].join('\n')
  const a = document.createElement('a')
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }))
  a.download = filename
  document.body.appendChild(a); a.click(); document.body.removeChild(a)
}

function exportInputs(ai) {
  const { vdrCase: v, myCase: m } = ai
  const diff = (a, b) => { const an=parseFloat(a), bn=parseFloat(b); return (isNaN(an)||isNaN(bn)) ? '' : (bn-an).toFixed(4) }
  const pct  = (a, b) => { const an=parseFloat(a), bn=parseFloat(b); return (isNaN(an)||isNaN(bn)||an===0) ? '' : `${(((bn-an)/Math.abs(an))*100).toFixed(1)}%` }
  const row  = (label, key) => ({ Input: label, 'VDR Case': v[key], 'My Case': m[key], Variance: diff(v[key],m[key]), 'Variance %': pct(v[key],m[key]) })
  dlCSV('aries_inputs_export.csv', [
    row('Fixed Costs ($/well/month)', 'fixedPerWellMonth'),
    row('Variable Oil ($/BOE)', 'varOilPerBOE'),
    row('Variable Water ($/BBL water)', 'varWaterPerBBL'),
    row('Production Taxes (% revenue)', 'prodTaxPct'),
    row('Oil Differential ($/BBL)', 'oilDiff'),
    row('Gas Differential ($/MMBTU)', 'gasDiff'),
    row('NGL Differential (% of WTI)', 'nglDiffPct'),
  ])
}

function exportHistorical(wellData) {
  const rows = []
  for (const w of wellData) {
    for (const m of w.monthlyData) {
      rows.push({
        Well: w.wellName, Date: m.monthKey, NRI: w.nri, WI: w.wi,
        'Net Oil (BBL)': m.oil_vol.toFixed(0), 'Net Gas (MCF)': m.gas_vol.toFixed(0),
        'Net NGL (BBL)': m.ngl_vol.toFixed(0), 'Net BOE': m.netBOE.toFixed(0),
        'Fixed ($)': m.fixed.toFixed(0), 'Var Oil ($)': m.var_oil.toFixed(0),
        'Var Water ($)': m.var_water.toFixed(0), 'Prod Taxes ($)': m.prod_taxes.toFixed(0),
        'Total LOS ($)': m.totalLOS.toFixed(0), 'Revenue ($)': m.totalRevenue.toFixed(0),
        'Op Margin ($)': m.opMargin.toFixed(0),
        'LOS/BOE': m.costPerBOE.toFixed(2), 'Revenue/BOE': m.revenuePerBOE.toFixed(2),
        'Margin/BOE': m.marginPerBOE.toFixed(2), 'Realized Oil': m.realizedOil.toFixed(2),
        'Realized Gas': m.realizedGas.toFixed(3), 'Realized NGL': m.realizedNGL.toFixed(2),
      })
    }
  }
  dlCSV('los_historical_export.csv', rows)
}

// ─── SHARED CHART CONFIG ─────────────────────────────────────────────────────

const CM  = { top: 4, right: 16, left: 0, bottom: 0 }
const GP  = { strokeDasharray: '3 3', stroke: '#2a2d3a', vertical: false }
const AP  = { tick: { fill: '#4a4d5a', fontSize: 10 }, axisLine: { stroke: '#2a2d3a' }, tickLine: { stroke: '#2a2d3a' } }
const TP  = {
  contentStyle: { backgroundColor: '#1a1d27', border: '1px solid #2a2d3a', borderRadius: '6px', fontSize: '12px', color: '#f0f0f0' },
  labelStyle: { color: '#8b8fa8' },
  cursor: { fill: 'rgba(255,255,255,0.03)' },
}
const LP  = { wrapperStyle: { fontSize: '10px', paddingTop: '8px' } }

const fD  = n => (n==null||isNaN(n)) ? '—' : n.toFixed(0)
const fD1 = n => (n==null||isNaN(n)) ? '—' : n.toFixed(1)
const fK  = n => (n==null||isNaN(n)) ? '—' : `$${(n/1000).toFixed(0)}K`
const f$  = n => (n==null||isNaN(n)) ? '—' : `$${Number(n).toLocaleString('en-US',{maximumFractionDigits:0})}`
const fB  = n => (n==null||isNaN(n)) ? '—' : `$${Number(n).toFixed(2)}`
const fP  = n => (n==null||isNaN(n)) ? '—' : `${Number(n).toFixed(2)}%`
const fG  = n => (n==null||isNaN(n)) ? '—' : `$${Number(n).toFixed(3)}`

function safeAvg(arr, key) {
  const vals = arr.map(d => d[key]).filter(v => v != null && isFinite(v) && v !== 0)
  return vals.length ? vals.reduce((a,b) => a+b, 0) / vals.length : null
}

// ─── CHART CARD ──────────────────────────────────────────────────────────────

function buildMiniRows(data, key) {
  if (!data || !data.length) return []
  const last3 = data.slice(-3)
  const avg = safeAvg(data, key) || 0
  return [...last3.map(d => ({ label: d.monthDisp || d.label, value: d[key] || 0 })), { label: 'Avg', value: avg }]
}

function ChartCard({ title, subtitle, children, miniRows, miniFmt }) {
  return (
    <div className="bg-[#1a1d27] border border-[#2a2d3a] rounded-lg p-5 flex flex-col">
      <div className="mb-3 flex-shrink-0">
        <h3 className="text-sm font-semibold text-[#f0f0f0] leading-tight">{title}</h3>
        {subtitle && <p className="text-xs text-[#8b8fa8] mt-0.5">{subtitle}</p>}
      </div>
      <div style={{height:'224px'}}>{children}</div>
      {miniRows && miniRows.length > 0 && (
        <div className="mt-3 pt-3 border-t border-[#2a2d3a]">
          <div style={{display:'grid', gridTemplateColumns:`auto repeat(${miniRows.length},1fr)`, gap:'4px 8px'}} className="text-xs">
            <span className="text-[#4a4d5a]">Period</span>
            {miniRows.map(r => <span key={r.label} className="text-[#8b8fa8] text-right">{r.label}</span>)}
            <span className="text-[#4a4d5a]">Value</span>
            {miniRows.map(r => <span key={r.label} className="text-[#f0f0f0] text-right font-medium">{miniFmt ? miniFmt(r.value) : r.value}</span>)}
          </div>
        </div>
      )}
    </div>
  )
}

// ─── ARIES REFERENCE LINES ───────────────────────────────────────────────────

function AriesLines({ myVal, vdrVal, fmtFn }) {
  const fmt = fmtFn || fB
  return (
    <>
      {myVal != null && isFinite(myVal) && (
        <ReferenceLine y={myVal} stroke={C.myCase} strokeDasharray="5 3" strokeWidth={1.5}
          label={{ value: `My: ${fmt(myVal)}`, fill: C.myCase, fontSize: 9, position: 'insideTopRight' }} />
      )}
      {vdrVal != null && isFinite(vdrVal) && (
        <ReferenceLine y={vdrVal} stroke={C.vdrCase} strokeDasharray="2 4" strokeWidth={1.5}
          label={{ value: `VDR: ${fmt(vdrVal)}`, fill: C.vdrCase, fontSize: 9, position: 'insideBottomRight' }} />
      )}
    </>
  )
}

const INPUT_FIELDS = [
  { key: 'fixedPerWellMonth', label: 'Fixed Costs',          unit: '$/well/month',   lowerIsBetter: true,  histKey: 'fixedPerWell',   fmt: v => f$(v) },
  { key: 'varOilPerBOE',      label: 'Variable Oil Costs',   unit: '$/BOE',           lowerIsBetter: true,  histKey: 'varOilPerBOE',   fmt: v => fB(v) },
  { key: 'varWaterPerBBL',    label: 'Variable Water Costs', unit: '$/BBL water',     lowerIsBetter: true,  histKey: null,             fmt: v => fB(v) },
  { key: 'prodTaxPct',        label: 'Production Taxes',     unit: '% of revenue',   lowerIsBetter: true,  histKey: 'prodTaxPct',     fmt: v => fP(v) },
  { key: 'oilDiff',           label: 'Oil Differential',     unit: '$/BBL vs. WTI',  lowerIsBetter: false, histKey: null,             fmt: v => fB(v) },
  { key: 'gasDiff',           label: 'Gas Differential',     unit: '$/MMBTU vs. HH', lowerIsBetter: false, histKey: null,             fmt: v => fG(v) },
  { key: 'nglDiffPct',        label: 'NGL Differential',     unit: '% of WTI',       lowerIsBetter: false, histKey: null,             fmt: v => `${Number(v).toFixed(1)}%` },
]

function InputsTab({ ariesInputs, setAriesInputs, monthlyRollup }) {
  const hAvgs = useMemo(() => {
    if (!monthlyRollup.length) return {}
    const out = {}
    INPUT_FIELDS.forEach(f => { if (f.histKey) out[f.key] = safeAvg(monthlyRollup, f.histKey) })
    return out
  }, [monthlyRollup])

  const onChange = (ct, key, val) =>
    setAriesInputs(prev => ({ ...prev, [ct]: { ...prev[ct], [key]: val } }))

  const variance = field => {
    const v = parseFloat(ariesInputs.vdrCase[field.key])
    const m = parseFloat(ariesInputs.myCase[field.key])
    if (isNaN(v) || isNaN(m)) return null
    const diff = m - v
    return { diff, pct: v !== 0 ? (diff / Math.abs(v)) * 100 : null }
  }

  const vColor = (field, v) => {
    if (!v) return 'text-[#4a4d5a]'
    if (v.diff === 0) return 'text-[#8b8fa8]'
    const better = field.lowerIsBetter ? v.diff < 0 : v.diff > 0
    return better ? 'text-emerald-400' : 'text-red-400'
  }

  return (
    <div className="space-y-6">
      <div className="flex items-start justify-between gap-4">
        <div>

            <li>Variable Water: water volumes not in LOS — shown as $/month</li>
            <li>Production Taxes: % of gross revenue</li>
            <li>Oil differential: $/BBL vs. WTI (negative = discount)</li>
            <li>Gas differential: $/MMBTU vs. Henry Hub</li>
            <li>NGL differential: % of WTI realized (e.g., 35%)</li>

        </div>
        <div className="bg-[#1a1d27] border border-[#2a2d3a] rounded-lg p-4">
          <h3 className="text-xs font-semibold text-[#8b8fa8] uppercase tracking-wider mb-2">Variance Legend</h3>
          <ul className="space-y-1.5 text-xs">
            <li className="text-emerald-400">Green — My Case better (lower cost / better differential)</li>
            <li className="text-red-400">Red — My Case worse (higher cost / worse differential)</li>
            <li className="text-[#8b8fa8]">Gray — Equal values</li>
          </ul>
          <div className="mt-3 pt-3 border-t border-[#2a2d3a]">
            <h3 className="text-xs font-semibold text-[#8b8fa8] uppercase tracking-wider mb-2">ARIES Overlays</h3>
            <p className="text-xs text-[#4a4d5a]">

              VDR Case → <span className="text-[#94a3b8]">slate dotted</span> lines.
            </p>
          </div>
        </div>
      </div>
    </div>
  )
}

const WBW_TYPES = [
  { id:'grossProduction', label:'Gross Production', pk:'grossBOEd',        fmt: v=>`${fD1(v)} BOE/d` },
  { id:'netProduction',   label:'Net Production',   pk:'netBOEd',          fmt: v=>`${fD1(v)} BOE/d` },
  { id:'totalLOS',        label:'Total LOS',        pk:'totalLOS',         fmt: fK },
  { id:'varOilPerBOE',    label:'Var Oil ($/BOE)',  pk:'varOilPerBOE',     fmt: fB },
  { id:'varWater',        label:'Var Water',        pk:'varWaterPerMonth', fmt: fK },
  { id:'fixedCost',       label:'Fixed ($/well)',   pk:'fixed',            fmt: fK },
  { id:'prodTaxPct',      label:'Prod Tax %',       pk:'prodTaxPct',       fmt: fP },
  { id:'costPerBOE',      label:'Cost/BOE',         pk:'costPerBOE',       fmt: fB },
  { id:'realizedOil',     label:'Realized Oil',     pk:'realizedOil',      fmt: fB },

  { id:'revenueMargin',   label:'Rev & Margin',     pk:'revenuePerBOE',    fmt: fB },
]

const WAP = { tick:{ fill:'#4a4d5a', fontSize:9 }, axisLine:{ stroke:'#2a2d3a' }, tickLine:{ stroke:'#2a2d3a' } }
const WCM = { top:2, right:6, left:0, bottom:0 }

// WellMiniChart receives width+height from ResponsiveContainer and passes to the chart
function WellMiniChart({ data, typeId, myCase, width, height }) {
  const my = {
    fixed:   parseFloat(myCase.fixedPerWellMonth) || null,
    varOil:  parseFloat(myCase.varOilPerBOE)       || null,
    prodTax: parseFloat(myCase.prodTaxPct)          || null,
  }
  const base = { data, width, height, margin: WCM }

  switch (typeId) {
    case 'grossProduction':
      return <BarChart {...base}><CartesianGrid {...GP}/><XAxis dataKey="monthDisp" {...WAP} interval="preserveStartEnd"/><YAxis {...WAP} tickFormatter={fD}/>
        <Tooltip {...TP} formatter={(v,n)=>[fD1(v),n]}/>
        <Bar dataKey="grossOild" name="Oil" fill={C.oil}  stackId="g"/>
        <Bar dataKey="grossNGLd" name="NGL" fill={C.ngl}  stackId="g"/>
        <Bar dataKey="grossGasd" name="Gas" fill={C.gas}  stackId="g"/>
      </BarChart>

    case 'netProduction':
      return <BarChart {...base}><CartesianGrid {...GP}/><XAxis dataKey="monthDisp" {...WAP} interval="preserveStartEnd"/><YAxis {...WAP} tickFormatter={fD}/>
        <Tooltip {...TP} formatter={(v,n)=>[fD1(v),n]}/>
        <Bar dataKey="netOild" name="Oil" fill={C.oil}  stackId="n"/>
        <Bar dataKey="netNGLd" name="NGL" fill={C.ngl}  stackId="n"/>
        <Bar dataKey="netGasd" name="Gas" fill={C.gas}  stackId="n"/>
      </BarChart>

    case 'totalLOS':
      return <BarChart {...base}><CartesianGrid {...GP}/><XAxis dataKey="monthDisp" {...WAP} interval="preserveStartEnd"/><YAxis {...WAP} tickFormatter={v=>`$${(v/1000).toFixed(0)}K`}/>
        <Tooltip {...TP} formatter={(v,n)=>[f$(v),n]}/>
        <Bar dataKey="fixed"      name="Fixed"  fill={C.fixed}     stackId="l"/>
        <Bar dataKey="var_oil"    name="VarOil" fill={C.varOil}    stackId="l"/>
        <Bar dataKey="var_water"  name="Water"  fill={C.varWater}  stackId="l"/>
        <Bar dataKey="prod_taxes" name="Tax"    fill={C.prodTaxes} stackId="l"/>

    case 'varOilPerBOE':
      return <LineChart {...base}><CartesianGrid {...GP}/><XAxis dataKey="monthDisp" {...WAP} interval="preserveStartEnd"/><YAxis {...WAP} tickFormatter={v=>`$${v.toFixed(1)}`}/>
        <Tooltip {...TP} formatter={v=>[fB(v),'Var Oil']}/>
        <Line dataKey="varOilPerBOE" name="Var Oil" stroke={C.varOil} dot={false} strokeWidth={1.5}/>
        {my.varOil && <ReferenceLine y={my.varOil} stroke={C.myCase} strokeDasharray="4 3" strokeWidth={1.5}/>}
      </LineChart>

    case 'varWater':
      return <LineChart {...base}><CartesianGrid {...GP}/><XAxis dataKey="monthDisp" {...WAP} interval="preserveStartEnd"/><YAxis {...WAP} tickFormatter={v=>`$${(v/1000).toFixed(0)}K`}/>
        <Tooltip {...TP} formatter={v=>[f$(v),'Var Water']}/>
        <Line dataKey="varWaterPerMonth" name="Var Water" stroke={C.varWater} dot={false} strokeWidth={1.5}/>
      </LineChart>

    case 'fixedCost':
      return <LineChart {...base}><CartesianGrid {...GP}/><XAxis dataKey="monthDisp" {...WAP} interval="preserveStartEnd"/><YAxis {...WAP} tickFormatter={v=>`$${(v/1000).toFixed(0)}K`}/>
        <Tooltip {...TP} formatter={v=>[f$(v),'Fixed']}/>
        <Line dataKey="fixed" name="Fixed" stroke={C.fixed} dot={false} strokeWidth={1.5}/>
        {my.fixed && <ReferenceLine y={my.fixed} stroke={C.myCase} strokeDasharray="4 3" strokeWidth={1.5}/>}
      </LineChart>

    case 'prodTaxPct':
      return <LineChart {...base}><CartesianGrid {...GP}/><XAxis dataKey="monthDisp" {...WAP} interval="preserveStartEnd"/><YAxis {...WAP} tickFormatter={v=>`${v.toFixed(1)}%`}/>
        <Tooltip {...TP} formatter={v=>[fP(v),'Prod Tax']}/>

        <Tooltip {...TP} formatter={v=>[fB(v),'LOS/BOE']}/>
        <Line dataKey="costPerBOE" name="LOS/BOE" stroke={C.cost} dot={false} strokeWidth={1.5}/>
      </LineChart>

    case 'realizedOil':
      return <LineChart {...base}><CartesianGrid {...GP}/><XAxis dataKey="monthDisp" {...WAP} interval="preserveStartEnd"/><YAxis {...WAP} tickFormatter={v=>`$${v.toFixed(0)}`}/>
        <Tooltip {...TP} formatter={v=>[fB(v),'Realized Oil']}/>
        <Line dataKey="realizedOil" name="Realized Oil" stroke={C.oil} dot={false} strokeWidth={1.5}/>
      </LineChart>

    case 'realizedGas':
      return <LineChart {...base}><CartesianGrid {...GP}/><XAxis dataKey="monthDisp" {...WAP} interval="preserveStartEnd"/><YAxis {...WAP} tickFormatter={v=>`$${v.toFixed(2)}`}/>
        <Tooltip {...TP} formatter={v=>[fG(v),'Realized Gas']}/>
        <Line dataKey="realizedGas" name="Realized Gas" stroke={C.gas} dot={false} strokeWidth={1.5}/>
      </LineChart>

    default: // revenueMargin
      return <ComposedChart {...base}><CartesianGrid {...GP}/><XAxis dataKey="monthDisp" {...WAP} interval="preserveStartEnd"/><YAxis {...WAP} tickFormatter={v=>`$${v.toFixed(1)}`}/>
        <Tooltip {...TP} formatter={v=>[fB(v)]}/>
        <Line dataKey="revenuePerBOE" name="Revenue" stroke={C.revenue} dot={false} strokeWidth={1.5}/>
        <Line dataKey="marginPerBOE"  name="Margin"  stroke={C.margin}  dot={false} strokeWidth={1.5}/>
        <ReferenceLine y={0} stroke="#4a4d5a" strokeDasharray="3 3"/>
      </ComposedChart>
  }
}

const WellCard = memo(function WellCard({ well, typeDef, ariesInputs }) {
  const d = well.monthlyData
  const avgAll = safeAvg(d, typeDef.pk)
  const last   = d[d.length-1]
  const lastV  = last ? last[typeDef.pk] : null
  const avg6   = safeAvg(d.slice(-6), typeDef.pk)
  const chg6   = (lastV != null && avg6 != null && avg6 !== 0) ? ((lastV - avg6) / Math.abs(avg6)) * 100 : null

  return (
    <div className="bg-[#1a1d27] border border-[#2a2d3a] rounded-lg overflow-hidden">
      <div className="px-4 py-3 border-b border-[#2a2d3a] flex items-start justify-between gap-2">
        <div className="min-w-0">
          <div className="text-sm font-semibold text-[#f0f0f0] truncate" title={well.wellName}>{well.wellName}</div>
          <div className="flex items-center gap-1.5 mt-1.5 flex-wrap">
            {well.jpRp  && <span className="px-1.5 py-0.5 rounded text-[9px] font-semibold uppercase tracking-wide bg-[#6366f1]/20 text-[#a5b4fc]">{well.jpRp}</span>}
            {well.opObo && <span className={`px-1.5 py-0.5 rounded text-[9px] font-semibold uppercase tracking-wide ${well.opObo==='OP' ? 'bg-emerald-500/20 text-emerald-400' : 'bg-amber-500/20 text-amber-400'}`}>{well.opObo}</span>}
            <span className="text-[9px] text-[#4a4d5a] font-mono">NRI {(well.nri*100).toFixed(1)}% · WI {(well.wi*100).toFixed(1)}%</span>
          </div>
        </div>
        {lastV != null && (
          <div className="text-right flex-shrink-0">
            <div className="text-sm font-semibold text-[#f0f0f0]">{typeDef.fmt(lastV)}</div>
            <div className="text-[9px] text-[#8b8fa8]">last mo</div>
          </div>
        )}
      </div>

      <div className="px-2 pt-3 pb-1" style={{height:'180px'}}>
        <ResponsiveContainer width="100%" height="100%">
          <WellMiniChart data={d} typeId={typeDef.id} myCase={ariesInputs.myCase}/>
        </ResponsiveContainer>
      </div>

      <div className="px-4 py-2.5 border-t border-[#2a2d3a]" style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:'8px'}}>
        <div>
          <div className="text-[9px] text-[#4a4d5a] uppercase tracking-wide">Avg (all)</div>
          <div className="text-xs text-[#8b8fa8] font-mono mt-0.5">{avgAll!=null ? typeDef.fmt(avgAll) : '—'}</div>
        </div>
        <div>
          <div className="text-[9px] text-[#4a4d5a] uppercase tracking-wide">6-mo Avg</div>
          <div className="text-xs text-[#8b8fa8] font-mono mt-0.5">{avg6!=null ? typeDef.fmt(avg6) : '—'}</div>
        </div>
        <div>
          <div className="text-[9px] text-[#4a4d5a] uppercase tracking-wide">vs. 6-mo</div>
          <div className={`text-xs font-mono mt-0.5 ${chg6==null?'text-[#4a4d5a]':chg6<0?'text-emerald-400':chg6>0?'text-red-400':'text-[#8b8fa8]'}`}>
            {chg6!=null ? `${chg6>0?'+':''}${chg6.toFixed(1)}%` : '—'}
          </div>
        </div>
      </div>
    </div>
  )
})

function WellByWellTab({ wellData, ariesInputs }) {
  const [typeId, setTypeId] = useState('netProduction')
  const [search, setSearch] = useState('')
  const typeDef = WBW_TYPES.find(t => t.id === typeId) || WBW_TYPES[0]

  const filtered = useMemo(() => {
    if (!search.trim()) return wellData
    const q = search.toLowerCase()
    return wellData.filter(w => w.wellName.toLowerCase().includes(q))
  }, [wellData, search])

  if (!wellData || !wellData.length) return (
    <div className="flex items-center justify-center h-64 text-[#8b8fa8] text-sm">No data loaded — upload a CSV file to view well cards.</div>
  )

  return (
    <div className="space-y-4">
      <div>
        <h2 className="text-lg font-semibold">Well by Well</h2>
        <p className="text-xs text-[#8b8fa8] mt-1">{wellData.length} wells — select chart type to apply to all cards</p>
      </div>

      <div className="flex flex-wrap items-center gap-3">
        <input type="text" value={search} onChange={e => setSearch(e.target.value)}
          placeholder="Search wells…"
          className="pl-3 pr-3 py-1.5 bg-[#1a1d27] border border-[#2a2d3a] rounded text-xs text-[#f0f0f0] placeholder-[#4a4d5a] outline-none focus:border-[#4a4d5a] w-48"/>
        <div className="flex flex-wrap gap-1">
          {WBW_TYPES.map(t => (
            <button key={t.id} onClick={() => setTypeId(t.id)}
              className={`px-2.5 py-1 rounded text-xs font-medium transition-colors cursor-pointer
                ${typeId===t.id ? 'bg-[#4e9af1] text-white' : 'bg-[#1a1d27] border border-[#2a2d3a] text-[#8b8fa8] hover:text-[#f0f0f0] hover:border-[#4a4d5a]'}`}>
              {t.label}
            </button>
          ))}
        </div>
      </div>

      {search && <p className="text-xs text-[#8b8fa8]">Showing {filtered.length} of {wellData.length} wells</p>}

      <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'16px'}}>
        {filtered.map(w => (
          <WellCard key={w.wellName} well={w} typeDef={typeDef} ariesInputs={ariesInputs}/>
        ))}
      </div>

      {filtered.length === 0 && (
        <div className="text-center py-12 text-[#4a4d5a] text-sm">No wells match "{search}"</div>
      )}
    </div>
  )
}

// ─── UPLOAD ZONE ─────────────────────────────────────────────────────────────

function UploadZone({ onFile, compact }) {
  const [drag, setDrag] = useState(false)
  const onDrop = e => { e.preventDefault(); setDrag(false); const f=e.dataTransfer.files[0]; if(f) onFile(f) }
  const onPick = e => { if(e.target.files[0]) onFile(e.target.files[0]) }

  if (compact) {
    return (
      <label onDrop={onDrop} onDragOver={e=>{e.preventDefault();setDrag(true)}} onDragLeave={()=>setDrag(false)}
        className={`flex items-center gap-2 px-3 py-1.5 rounded border border-dashed text-xs cursor-pointer transition-colors
          ${drag ? 'border-[#4e9af1] text-[#4e9af1]' : 'border-[#2a2d3a] text-[#4a4d5a] hover:border-[#4a4d5a] hover:text-[#8b8fa8]'}`}>
        <input type="file" accept=".csv,.txt,.tsv" className="hidden" onChange={onPick}/>
        Reload CSV
      </label>
    )
  }

  return (
    <label onDrop={onDrop} onDragOver={e=>{e.preventDefault();setDrag(true)}} onDragLeave={()=>setDrag(false)}
      className={`block border-2 border-dashed rounded-xl p-16 text-center cursor-pointer transition-colors
        ${drag ? 'border-[#4e9af1] bg-[#4e9af1]/5' : 'border-[#2a2d3a] hover:border-[#4a4d5a]'}`}>
      <input type="file" accept=".csv,.txt,.tsv" className="hidden" onChange={onPick}/>
      <div className="flex flex-col items-center gap-4">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" className="text-[#2a2d3a]">
          <rect x="8" y="6" width="32" height="36" rx="4" stroke="currentColor" strokeWidth="2"/>
          <path d="M16 18h16M16 26h16M16 34h10" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
          <circle cx="36" cy="36" r="10" fill="#0f1117" stroke="currentColor" strokeWidth="2"/>
          <path d="M36 30v12M31 35l5-5 5 5" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
        <div>
          <p className="text-sm text-[#8b8fa8] font-medium">
            Drop <code className="text-[#f0f0f0] bg-[#2a2d3a] px-1 rounded">los_data.csv</code> here or click to browse
          </p>
          <p className="text-xs text-[#4a4d5a] mt-1">Tab-delimited · 22 columns · Service End Date format M/DD/YY</p>
        </div>
        <div className="text-[10px] text-[#4a4d5a] bg-[#1a1d27] border border-[#2a2d3a] rounded px-4 py-2 leading-relaxed max-w-lg text-center">
          Cols: Well Name · Cost Category · Gross Up By · NRI · WI · Gross Amount · Gross Volume · Net Amount(1) ·
          JP/RP · x · Comp · <strong className="text-[#6a6d7a]">Service End Date</strong> · Property # · Property Name · JP/RP ·
          OP/OBO · <strong className="text-[#6a6d7a]">LOS CATEGORY</strong> · Main · Sub · Alloc LOE ·
          <strong className="text-[#6a6d7a]">Net Volume</strong> · <strong className="text-[#6a6d7a]">Net Amount</strong>
        </div>
      </div>
    </label>
  )
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────

const TABS = [
  { id:'inputs',     label:'ARIES Inputs' },
  { id:'rollup',     label:'Portfolio Rollup' },
  { id:'wellbywell', label:'Well by Well' },
]
const EC = { fixedPerWellMonth:'', varOilPerBOE:'', varWaterPerBBL:'', prodTaxPct:'', oilDiff:'', gasDiff:'', nglDiffPct:'' }

function App() {
  const [tab,    setTab]    = useState('inputs')
  const [rows,   setRows]   = useState(null)
  const [loading,setLoading]= useState(false)
  const [error,  setError]  = useState(null)
  const [fname,  setFname]  = useState(null)
  const [inputs, setInputs] = useState({ vdrCase:{...EC}, myCase:{...EC} })

  const processText = useCallback((text, name) => {
    setLoading(true); setError(null)
    setTimeout(() => {
      try {
        const r = parseCSVText(text)
        setRows(r); setFname(name||'data.csv'); setError(null)
      } catch(e) { setError(e.message) }
      finally { setLoading(false) }
    }, 50)
  }, [])

  const processFile = useCallback(file => {
    const r = new FileReader()
    r.onload  = e => processText(e.target.result, file.name)
    r.onerror = () => { setError('Failed to read file.'); setLoading(false) }
    r.readAsText(file)
  }, [processText])

  const rollup   = useMemo(() => rows ? buildMonthlyRollup(rows) : [], [rows])
  const wellData = useMemo(() => rows ? buildWellData(rows) : [],      [rows])

  return (
    <div className="min-h-screen bg-[#0f1117] text-[#f0f0f0]">

      <header className="border-b border-[#2a2d3a] sticky top-0 z-20"
        style={{backgroundColor:'rgba(15,17,23,0.97)', backdropFilter:'blur(8px)'}}>
        <div className="max-w-[1440px] mx-auto px-6 py-3 flex items-center justify-between gap-4">
          <div className="flex items-center gap-4 min-w-0">
            <div>
              <h1 className="text-base font-semibold tracking-tight text-white leading-tight">E&amp;P LOS Dashboard</h1>
              <p className="text-[10px] text-[#8b8fa8] leading-tight">PE Due Diligence · Lease Operating Statement Analysis</p>
            </div>
            {rows && (
              <div className="hidden sm:flex items-center gap-2">
                <span className="w-1.5 h-1.5 rounded-full flex-shrink-0" style={{backgroundColor:'#34d399'}}/>
                <span className="text-xs text-[#8b8fa8] truncate">{fname}</span>
                <span className="text-xs text-[#4a4d5a]">{rows.length.toLocaleString()} rows · {wellData.length} wells · {rollup.length} months</span>
              </div>
            )}
          </div>
          <UploadZone onFile={processFile} compact/>
        </div>
      </header>

      <nav className="border-b border-[#2a2d3a] bg-[#0f1117]">
        <div className="max-w-[1440px] mx-auto px-6 flex">
          {TABS.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)}
              className={`px-5 py-3 text-sm font-medium border-b-2 transition-colors cursor-pointer
                ${tab===t.id ? 'border-[#4e9af1] text-[#4e9af1]' : 'border-transparent text-[#8b8fa8] hover:text-[#f0f0f0] hover:border-[#4a4d5a]'}`}>
              {t.label}
            </button>
          ))}
        </div>
      </nav>

      <main className="max-w-[1440px] mx-auto px-6 py-6">

        {loading && (
          <div className="flex flex-col items-center justify-center h-64 gap-3">
            <div className="relative w-10 h-10">
              <div className="absolute inset-0 rounded-full border-2 border-[#2a2d3a]"/>
              <div className="absolute inset-0 rounded-full border-2 border-t-[#4e9af1] spinner"/>
            </div>
            <p className="text-sm text-[#8b8fa8]">Parsing LOS data…</p>
          </div>
        )}

        {!loading && error && (
          <div className="mb-6 max-w-2xl space-y-4">
            <div className="bg-red-500/10 border border-red-500/30 rounded-lg p-5">
              <p className="text-red-400 text-sm font-semibold">Parse Error</p>
              <p className="text-red-300 text-xs mt-1 leading-relaxed">{error}</p>
              <p className="text-[#8b8fa8] text-xs mt-2">Check tab delimiters (not commas), 22 columns, and M/DD/YY date format.</p>
            </div>
            <UploadZone onFile={processFile}/>
          </div>
        )}

        {!loading && !error && !rows && <UploadZone onFile={processFile}/>}

        {!loading && rows && (
          <>
            {tab==='inputs'     && <InputsTab     ariesInputs={inputs} setAriesInputs={setInputs} monthlyRollup={rollup}/>}
            {tab==='rollup'     && <RollupTab     monthlyRollup={rollup} ariesInputs={inputs} wellData={wellData}/>}
            {tab==='wellbywell' && <WellByWellTab wellData={wellData} ariesInputs={inputs}/>}
          </>
        )}

      </main>
    </div>
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>)
</script>
</body>
</html>
